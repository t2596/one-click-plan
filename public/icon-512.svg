<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <g fill="white" transform="translate(100, 100)">
    <!-- Calendar outline -->
    <rect x="20" y="60" width="270" height="220" rx="20" fill="none" stroke="white" stroke-width="18"/>
    <rect x="20" y="60" width="270" height="55" rx="20" fill="white" opacity="0.3"/>
    <rect x="20" y="60" width="270" height="55" rx="20" fill="none" stroke="white" stroke-width="18"/>
    <!-- Calendar pins -->
    <line x1="60" y1="20" x2="60" y2="60" stroke="white" stroke-width="18" stroke-linecap="round"/>
    <line x1="250" y1="20" x2="250" y2="60" stroke="white" stroke-width="18" stroke-linecap="round"/>
    <!-- Sparkle icon -->
    <g transform="translate(155, 140)">
      <path d="M 0,-40 L 8,-12 L 36,-4 L 8,4 L 0,32 L -8,4 L -36,-4 L -8,-12 Z" fill="white"/>
    </g>
    <!-- Lines representing schedule entries -->
    <rect x="50" y="190" width="210" height="12" rx="6" fill="white" opacity="0.6"/>
    <rect x="50" y="215" width="170" height="12" rx="6" fill="white" opacity="0.6"/>
    <rect x="50" y="240" width="190" height="12" rx="6" fill="white" opacity="0.6"/>
  </g>
</svg>
